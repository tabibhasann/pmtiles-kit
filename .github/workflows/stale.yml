name: Mark stale issues and PRs

on:
  schedule:
    - cron: '30 1 * * *'

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: |
            This issue has been inactive for 60 days and is being marked as stale.
            It will be closed in 7 days unless there is new activity.
            Comment to keep it open, or remove the stale label.
          stale-pr-message: |
            This PR has been inactive for 60 days and is being marked as stale.
            It will be closed in 7 days unless there is new activity.
          days-before-stale: 60
          days-before-close: 7
          exempt-issue-labels: 'pinned,security,enhancement,help wanted'
          exempt-pr-labels: 'pinned,security,WIP'
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
